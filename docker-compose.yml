version: "3.8"

services:
  n8n:
    build: .
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_RUNNERS_TASK_TIMEOUT=1800
      - NODE_FUNCTION_ALLOW_EXTERNAL=${NODE_FUNCTION_ALLOW_EXTERNAL}
      - N8N_PERSONALIZATION_ENABLED=${N8N_PERSONALIZATION_ENABLED}
      - N8N_RESTRICT_ENVIRONMENT_VARIABLES_ACCESS=${N8N_RESTRICT_ENVIRONMENT_VARIABLES_ACCESS}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=${N8N_BLOCK_ENV_ACCESS_IN_NODE}
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${TZ}
      # API keys exposed to n8n expressions via $env
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - ADZUNA_APP_ID=${ADZUNA_APP_ID}
      - ADZUNA_KEY=${ADZUNA_KEY}
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
      - GDRIVE_FOLDER_ID=${GDRIVE_FOLDER_ID}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL}
      # Pre-made resume Drive links
      - CV_LINK_COMPUTER_VISION=${CV_LINK_COMPUTER_VISION}
      - CV_LINK_ML_ENGINEER=${CV_LINK_ML_ENGINEER}
      - CV_LINK_DATA_SCIENTIST=${CV_LINK_DATA_SCIENTIST}
      - CV_LINK_DATA_ANALYST=${CV_LINK_DATA_ANALYST}
      - CV_LINK_SOFTWARE_ENGINEER=${CV_LINK_SOFTWARE_ENGINEER}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./pipeline:/home/node/pipeline
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - n8n

volumes:
  n8n_data:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
